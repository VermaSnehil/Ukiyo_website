<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — UKIYO AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Barlow:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #050508;
    color: #F0F0F0;
    font-family: 'Roboto', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,23,42,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,23,42,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  h1, h2 { font-family: 'Orbitron', sans-serif; }

  /* Login screen */
  #login-screen {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }

  .login-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%; max-width: 360px;
    text-align: center;
  }

  .login-card h1 {
    font-size: 1.4rem; color: #fff; margin-bottom: 0.3rem;
  }
  .login-card p { color: #555; font-family: 'Barlow', sans-serif; font-size: 0.9rem; margin-bottom: 1.5rem; }

  .login-card input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: #F0F0F0;
    font-size: 1rem;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    transition: border-color 0.18s;
  }
  .login-card input:focus { border-color: #C8172A; }

  .btn-red {
    width: 100%;
    background: #C8172A;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem 1.5rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-red:hover { background: #9E1221; }

  .login-error {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    font-family: 'Barlow', sans-serif;
    display: none;
  }

  /* Dashboard */
  #dashboard { display: none; position: relative; z-index: 1; }

  nav {
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(5,5,8,0.9);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: sticky; top: 0; z-index: 10;
  }

  nav span { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; }
  nav span em { color: #C8172A; font-style: normal; }

  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-right span { font-family: 'Barlow', sans-serif; font-size: 0.85rem; color: #555; }
  .nav-right button {
    background: none; border: 1px solid rgba(255,255,255,0.1); color: #666;
    border-radius: 6px; padding: 0.4rem 0.85rem;
    font-family: 'Barlow', sans-serif; font-size: 0.8rem; cursor: pointer;
    transition: color 0.18s, border-color 0.18s;
  }
  .nav-right button:hover { color: #C8172A; border-color: rgba(200,23,42,0.4); }

  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .stat-card .label { font-family: 'Barlow', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #555; margin-bottom: 0.4rem; }
  .stat-card .value { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; }
  .stat-card .value.red { color: #C8172A; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-header h2 { font-size: 1rem; color: #fff; letter-spacing: 0.02em; }

  .btn-refresh {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #888;
    border-radius: 6px; padding: 0.4rem 0.85rem;
    font-family: 'Barlow', sans-serif; font-size: 0.8rem; cursor: pointer;
    transition: color 0.18s;
  }
  .btn-refresh:hover { color: #fff; }

  .table-wrap {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead { background: rgba(255,255,255,0.04); }
  thead th {
    padding: 0.85rem 1rem;
    text-align: left;
    font-family: 'Barlow', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    white-space: nowrap;
  }
  tbody tr { border-top: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td { padding: 0.85rem 1rem; color: #ccc; vertical-align: middle; }
  tbody td.name { color: #fff; font-weight: 500; }
  tbody td.muted { color: #555; font-size: 0.82rem; }

  .badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge.pending { background: rgba(201,168,76,0.12); color: #C9A84C; border: 1px solid rgba(201,168,76,0.25); }
  .badge.active  { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .badge.starter { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); }
  .badge.growth  { background: rgba(200,23,42,0.08); color: #C8172A; border: 1px solid rgba(200,23,42,0.2); }
  .badge.enterprise { background: rgba(201,168,76,0.1); color: #C9A84C; border: 1px solid rgba(201,168,76,0.2); }

  .btn-activate {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.25);
    color: #4ade80;
    border-radius: 6px;
    padding: 0.35rem 0.75rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .btn-activate:hover { background: rgba(34,197,94,0.2); }
  .btn-activate:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: #444;
    font-family: 'Barlow', sans-serif;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: #444;
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.3);
    color: #4ade80;
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: rgba(200,23,42,0.15); border-color: rgba(200,23,42,0.3); color: #ff6b6b; }

  /* Activate Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-card {
    background: #0d0d12;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 2rem;
    width: 100%; max-width: 400px;
  }
  .modal-card h3 {
    font-family: 'Barlow', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: #fff; margin-bottom: 0.4rem;
  }
  .modal-card p { font-family: 'Barlow', sans-serif; font-size: 0.85rem; color: #666; margin-bottom: 1.25rem; }
  .modal-card label { font-family: 'Barlow', sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #555; display: block; margin-bottom: 0.4rem; }
  .modal-card input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: #F0F0F0;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.18s;
    margin-bottom: 1.25rem;
  }
  .modal-card input:focus { border-color: #C8172A; }
  .modal-actions { display: flex; gap: 0.75rem; }
  .modal-actions .btn-cancel {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #888;
    border-radius: 8px; padding: 0.75rem;
    font-family: 'Barlow', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: background 0.18s;
  }
  .modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
  .modal-actions .btn-confirm {
    flex: 2;
    background: #C8172A;
    border: none;
    color: #fff;
    border-radius: 8px; padding: 0.75rem;
    font-family: 'Barlow', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: background 0.18s;
  }
  .modal-actions .btn-confirm:hover { background: #9E1221; }
  .modal-actions .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>UKI<em style="color:#C8172A">¥</em>O AI</h1>
    <p>Admin access only</p>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password" />
    <button class="btn-red" onclick="checkPassword()">Enter</button>
    <div class="login-error" id="login-error">Incorrect password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <nav>
    <span>UKI<em>¥</em>O AI <span style="color:#444;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:400;margin-left:0.5rem;">Admin</span></span>
    <div class="nav-right">
      <span id="nav-time"></span>
      <button onclick="logout()">Log out</button>
    </div>
  </nav>

  <main>
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="label">Total Signups</div><div class="value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">Pending</div><div class="value red" id="stat-pending">—</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value" id="stat-active">—</div></div>
      <div class="stat-card"><div class="label">Starter</div><div class="value" id="stat-starter">—</div></div>
      <div class="stat-card"><div class="label">Growth</div><div class="value" id="stat-growth">—</div></div>
      <div class="stat-card"><div class="label">Enterprise</div><div class="value" id="stat-enterprise">—</div></div>
    </div>

    <div class="section-header">
      <h2>Customers</h2>
      <button class="btn-refresh" onclick="loadCustomers()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <div id="table-container" class="loading">Loading customers...</div>
    </div>
  </main>
</div>

<!-- Activate Modal -->
<div class="modal-overlay" id="activate-modal">
  <div class="modal-card">
    <h3>Activate Customer</h3>
    <p id="modal-customer-name" style="color:#aaa;font-size:0.9rem;margin-bottom:1rem;"></p>
    <label for="modal-phone">VAPI Phone Number</label>
    <input type="text" id="modal-phone" placeholder="+16812972541" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm-btn" onclick="confirmActivate()">Activate & Email</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://rtzdwgcpkkvdcdvukzly.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_uREILUSAbP7wDY7CKxR8Tg_Cl-qGWyA';
  const RAILWAY_URL = 'https://vapi-receptionist-production.up.railway.app';
  const ADMIN_PASSWORD = 'ukiyo2024admin';

  // ── Auth ──────────────────────────────────────────────────────────────────
  function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadCustomers();
      startClock();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function logout() {
    sessionStorage.removeItem('admin_auth');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // Auto-login if session active
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadCustomers();
    startClock();
  }

  // ── Clock ─────────────────────────────────────────────────────────────────
  function startClock() {
    const el = document.getElementById('nav-time');
    const tick = () => {
      el.textContent = new Date().toLocaleString('de-DE', { timeZone: 'Europe/Berlin', hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
    };
    tick();
    setInterval(tick, 60000);
  }

  // ── Load Customers ────────────────────────────────────────────────────────
  async function loadCustomers() {
    document.getElementById('table-container').innerHTML = '<div class="loading">Loading customers...</div>';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/customers?order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
      });
      if (!res.ok) throw new Error(await res.text());
      const customers = await res.json();
      renderStats(customers);
      renderTable(customers);
    } catch (err) {
      document.getElementById('table-container').innerHTML = `<div class="loading" style="color:#ff6b6b;">Failed to load: ${err.message}</div>`;
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function renderStats(customers) {
    document.getElementById('stat-total').textContent = customers.length;
    document.getElementById('stat-pending').textContent = customers.filter(c => c.status === 'pending').length;
    document.getElementById('stat-active').textContent = customers.filter(c => c.status === 'active').length;
    document.getElementById('stat-starter').textContent = customers.filter(c => c.plan === 'starter').length;
    document.getElementById('stat-growth').textContent = customers.filter(c => c.plan === 'growth').length;
    document.getElementById('stat-enterprise').textContent = customers.filter(c => c.plan === 'enterprise').length;
  }

  // ── Table ─────────────────────────────────────────────────────────────────
  function renderTable(customers) {
    if (!customers.length) {
      document.getElementById('table-container').innerHTML = '<div class="empty-state">No customers yet.</div>';
      return;
    }

    const rows = customers.map(c => {
      const date = new Date(c.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
      const planBadge = `<span class="badge ${c.plan || 'starter'}">${c.plan || 'starter'}</span>`;
      const statusBadge = `<span class="badge ${c.status || 'pending'}">${c.status || 'pending'}</span>`;
      const vapiNum = c.vapi_phone_number ? `<div style="color:#4ade80;font-size:0.75rem;margin-top:2px;">${c.vapi_phone_number}</div>` : '';
      const activateBtn = c.status !== 'active'
        ? `<button class="btn-activate" onclick="openActivateModal('${c.id}', '${c.email}', '${c.full_name}')">Mark Active</button>`
        : `<span style="color:#4ade80;font-size:0.8rem;">✓ Live</span>${vapiNum}`;

      return `<tr>
        <td class="name">${c.full_name || '—'}</td>
        <td>${c.email || '—'}</td>
        <td>${c.business_name || '—'}</td>
        <td class="muted">${c.business_type || '—'}</td>
        <td>${planBadge}</td>
        <td>${statusBadge}</td>
        <td class="muted">${c.phone_number || '—'}</td>
        <td class="muted">${c.business_hours || '—'}</td>
        <td class="muted">${date}</td>
        <td>${activateBtn}</td>
      </tr>`;
    }).join('');

    document.getElementById('table-container').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Business</th>
            <th>Type</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Phone</th>
            <th>Hours</th>
            <th>Signed Up</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Activate Modal ────────────────────────────────────────────────────────
  let _activateTarget = null;

  async function openActivateModal(id, email, name) {
    _activateTarget = { id, email, name, phoneNumberId: null };
    document.getElementById('modal-customer-name').textContent = `${name} · ${email}`;
    document.getElementById('modal-phone').value = 'Finding available number...';
    document.getElementById('modal-phone').disabled = true;
    document.getElementById('modal-confirm-btn').disabled = true;
    document.getElementById('modal-confirm-btn').textContent = 'Activate & Email';
    document.getElementById('activate-modal').classList.add('open');

    try {
      // Pick first unassigned number from pool
      const res = await fetch(`${SUPABASE_URL}/rest/v1/phone_numbers?is_assigned=eq.false&order=created_at.asc&limit=1`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
      });
      const numbers = await res.json();
      if (!numbers.length) {
        document.getElementById('modal-phone').value = '';
        document.getElementById('modal-phone').placeholder = 'No numbers available — add more to pool';
        document.getElementById('modal-phone').disabled = false;
        document.getElementById('modal-confirm-btn').disabled = false;
        return;
      }
      _activateTarget.phoneNumberId = numbers[0].id;
      document.getElementById('modal-phone').value = numbers[0].number;
      document.getElementById('modal-phone').disabled = false;
      document.getElementById('modal-confirm-btn').disabled = false;
    } catch (err) {
      document.getElementById('modal-phone').value = '';
      document.getElementById('modal-phone').placeholder = 'Enter number manually';
      document.getElementById('modal-phone').disabled = false;
      document.getElementById('modal-confirm-btn').disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('activate-modal').classList.remove('open');
    _activateTarget = null;
  }

  // Close modal on backdrop click
  document.getElementById('activate-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  async function confirmActivate() {
    const { id, email, name } = _activateTarget;
    const vapiPhone = document.getElementById('modal-phone').value.trim();
    if (!vapiPhone) {
      document.getElementById('modal-phone').focus();
      document.getElementById('modal-phone').style.borderColor = '#C8172A';
      return;
    }

    const confirmBtn = document.getElementById('modal-confirm-btn');
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<span class="spinner"></span> Activating...';

    try {
      // Update status + vapi_phone_number in Supabase
      const res = await fetch(`${SUPABASE_URL}/rest/v1/customers?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ status: 'active', vapi_phone_number: vapiPhone }),
      });
      // Mark phone number as assigned in pool
      if (_activateTarget.phoneNumberId) {
        await fetch(`${SUPABASE_URL}/rest/v1/phone_numbers?id=eq.${_activateTarget.phoneNumberId}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({ is_assigned: true, assigned_to: id }),
        });
      }

      // Send "you're live" email with phone number
      await fetch(`${RAILWAY_URL}/api/notify-active`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, full_name: name, vapi_phone_number: vapiPhone }),
      });

      closeModal();
      showToast('Customer activated and email sent!');
      setTimeout(loadCustomers, 800);
    } catch (err) {
      showToast('Failed: ' + err.message, true);
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Activate & Email';
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
